server {
    listen 3009;
    root /usr/share/nginx/html;
    index index.html;

    # Basic auth — controlled by /etc/nginx/auth.conf, generated at container startup
    # by docker-entrypoint.sh from GRIDMIND_USER / GRIDMIND_PASS env vars.
    # Contains either:  auth_basic "GridMind"; auth_basic_user_file /etc/nginx/.htpasswd;
    # Or:               auth_basic off;
    include /etc/nginx/auth.conf;

    # Proxy API calls to backend on port 8009
    location /api/ {
        proxy_pass http://backend:8009;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    # Proxy WebSocket to backend on port 8009
    location /ws {
        proxy_pass http://backend:8009;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }

    # SPA routing — all other routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
