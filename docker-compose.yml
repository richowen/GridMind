version: '3.8'

services:
  backend:
    build: ./backend
    container_name: gridmind-backend
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - DB_HOST=mariadb
      - DB_PORT=3306
      - DB_NAME=gridmind
    depends_on:
      mariadb:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./backend:/app  # Development hot-reload

  frontend:
    build: ./frontend
    container_name: gridmind-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  mariadb:
    image: mariadb:10.11
    container_name: gridmind-mariadb
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: gridmind
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  influxdb:
    image: influxdb:2.7
    container_name: gridmind-influxdb
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2
    restart: unless-stopped

volumes:
  mariadb_data:
  influxdb_data:
